---
layout: base
title: War3CS2 Stats
---

<div class="home">
  <h1 class="page-heading">{{ page.title }}</h1>

  <div class="war3-stats">

    <div class="stats-tabs">
      <button class="stats-tab active" data-tab="maps">Map Stats</button>
      <button class="stats-tab" data-tab="race-level">Highest Race Level</button>
      <button class="stats-tab" data-tab="any-race">Highest Any Race</button>
      <button class="stats-tab" data-tab="total-levels">Highest Total Levels</button>
      <button class="stats-tab" data-tab="race-time">Race Time</button>
      <button class="stats-tab" data-tab="total-time">Total Time</button>
    </div>

    <section class="stats-panel active" data-panel="maps">
      <div class="stats-table-wrap">
        <table id="mapStats"></table>
      </div>
    </section>

    <section class="stats-panel" data-panel="race-level">
      <label for="raceLevelInput">Race:</label>
      <div class="race-select-wrap">
        <select id="raceLevelInput"></select>
        <button type="button" class="race-select-button" data-target="raceLevelInput">▼</button>
      </div>

      <div class="stats-table-wrap">
        <table id="highestRaceLevel"></table>
      </div>
    </section>

    <section class="stats-panel" data-panel="any-race">
      <div class="stats-table-wrap">
        <table id="highestAnyRace"></table>
      </div>
    </section>

    <section class="stats-panel" data-panel="total-levels">
      <div class="stats-table-wrap">
        <table id="highestTotalLevels"></table>
      </div>
    </section>

    <section class="stats-panel" data-panel="race-time">
      <label for="raceTimeInput">Race:</label>
      <div class="race-select-wrap">
        <select id="raceTimeInput"></select>
        <button type="button" class="race-select-button" data-target="raceTimeInput">▼</button>
      </div>

      <div class="stats-table-wrap">
        <table id="raceTimeTable"></table>
      </div>
    </section>

    <section class="stats-panel" data-panel="total-time">
      <div class="stats-table-wrap">
        <table id="totalTimeTable"></table>
      </div>
    </section>

  </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>


<style>
.stats-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(0.1rem, 0.4vw, 0.25rem);
  margin-bottom: clamp(0.5rem, 1.2vw, 1rem);
}

.stats-tab {
  cursor: pointer;
  padding: clamp(0.2rem, 0.6vw, 0.4rem) clamp(0.35rem, 1vw, 0.75rem);
  font-size: clamp(0.45rem, 1.2vw, 1rem);
  line-height: 1.15;
  border: 1px solid #666;
  border-bottom: none;
  background: #2b2b2b;
  color: inherit;
  white-space: normal;
}

.stats-tab.active {
  font-weight: bold;
  background: #444;
}

.stats-panel {
  display: none;
}

.stats-panel.active {
  display: block;
}

.war3-stats input {
  margin: 0.5rem 0 1rem;
  max-width: 100%;
}

.war3-stats section {
  margin-bottom: 2rem;
}

.stats-table-wrap {
  max-height: 14lh;
  overflow-y: auto;
  overflow-x: hidden;
  width: 100%;
}

.war3-stats table {
  width: 100%;
  max-width: 100%;
  table-layout: fixed;
  border-collapse: collapse;
  display: table;
  font-size: clamp(.5rem, 1.2vw, 1rem);
}

.war3-stats thead {
  display: table-header-group;
}

.war3-stats tbody {
  display: table-row-group;
}

.war3-stats tr {
  display: table-row;
}

.war3-stats th,
.war3-stats td {
  display: table-cell;
  width: auto;
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: normal;
  vertical-align: top;
  box-sizing: border-box;
  padding: 0.5em 0.75em;
  line-height: 1.25;
}

.war3-stats th {
  cursor: pointer;
  position: sticky;
  top: 0;
  z-index: 2;
}

.war3-stats th .header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 0.5rem;
  width: 100%;
}

.war3-stats th .header-label {
  flex: 1 1 auto;
  min-width: 0;
}

.war3-stats th .header-sort {
  flex: 0 0 1.25em;
  width: 1.25em;
  text-align: center;
  opacity: 0.7;
}

.race-select-wrap {
  display: flex;
  width: 100%;
  max-width: 100%;
  margin: 0.5rem 0 1rem;
  font-size: clamp(.5rem, 1.2vw, 1rem);
}

.race-select-wrap .ts-wrapper {
  flex: 1 1 auto;
  min-width: 0;
  width: 100%;
}

.race-select-wrap .ts-control {
  width: 100%;
  min-height: 0;
  padding: 0.5em 0.75em;
  font-size: inherit;
  line-height: 1.25;
}

.race-select-wrap .ts-control input {
  font-size: inherit;
}

.race-select-button {
  flex: 0 0 clamp(1.5rem, 3vw, 2.5rem);
  width: clamp(1.5rem, 3vw, 2.5rem);
  padding: 0;
  font-size: inherit;
  line-height: 1;
  cursor: pointer;
}

.ts-control::after {
  margin-left: auto;
  opacity: 0.7;
  font-size: 0.75em;
}

.ts-control {
  cursor: pointer;
}
</style>

<script>
const DATA_PATH = "/assets/data/";

let mapPlaytime = [];
let racePlaytime = [];
let raceLevels = [];
let raceColumns = [];

function prettyName(str) {
  return str.replaceAll("_", " ").replace(/\b\w/g, c => c.toUpperCase());
}

function forceUtc(utcString) {
  if (!utcString) return "";

  let fixed = String(utcString);

  if (!fixed.endsWith("Z") && !fixed.includes("+")) {
    fixed += "Z";
  }

  return fixed;
}

function formatLocalTime(utcString) {
  if (!utcString) return "";

  let fixed = String(utcString);

  if (!fixed.endsWith("Z") && !fixed.includes("+")) {
    fixed += "Z";
  }

  return new Date(forceUtc(fixed)).toLocaleString(undefined, {
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit",
    second: "2-digit"
  });
}

function getRaceColumns(data) {
  if (!data.length) return [];

  return Object.keys(data[0]).filter(key =>
    key !== "player_name" &&
    key !== "last_seen"
  );
}

const sortStates = {};

function renderTable(tableId, columns, rows) {
  const table = document.getElementById(tableId);

  const getArrow = (key) => {
    const stateKey = `${tableId}:${key}`;

    if (!(stateKey in sortStates)) {
      return "↕";
    }

    return sortStates[stateKey] ? "↑" : "↓";
  };

  table.innerHTML = `
    <thead>
      <tr>
        ${columns.map(col =>
          `<th data-key="${col.key}">
          <span class="header-inner">
          <span class="header-label">${col.label}</span>
          <span class="header-sort">${getArrow(col.key)}</span>
          </span></th>`
        ).join("")}
      </tr>
    </thead>
    <tbody>
      ${rows.map(row => `
        <tr>
          ${columns.map(col =>
            `<td>${row[col.key] ?? ""}</td>`
          ).join("")}
        </tr>
      `).join("")}
    </tbody>
  `;

  table.querySelectorAll("th").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      const sortKey = columns.find(col => col.key === key)?.sortKey || key;
      const stateKey = `${tableId}:${key}`;
      const currentState = sortStates[stateKey] || false;

      Object.keys(sortStates).forEach(k => {
        if (k.startsWith(`${tableId}:`)) {
          delete sortStates[k];
        }
      });

      sortStates[stateKey] = !currentState;

      const asc = sortStates[stateKey];

      rows.sort((a, b) => {
        const av = a[sortKey] ?? "";
        const bv = b[sortKey] ?? "";

        const aNum = Number(av);
        const bNum = Number(bv);

        if (!isNaN(aNum) && !isNaN(bNum)) {
          return asc ? aNum - bNum : bNum - aNum;
        }

        return asc
          ? String(av).localeCompare(String(bv))
          : String(bv).localeCompare(String(av));
      });

      renderTable(tableId, columns, rows);
    });
  });
}

function setupRaceDropdown() {
  const options = raceColumns.map(race => ({
    value: race,
    text: prettyName(race)
  }));

  new TomSelect("#raceLevelInput", {
    options,
    valueField: "value",
    labelField: "text",
    searchField: "text",
    create: false,
    maxOptions: null,
    openOnFocus: false,
    onType: function () {
      this.open();
    },
    onChange: value => {
      if (value) renderHighestRaceLevel(value);
    }
  });

  new TomSelect("#raceTimeInput", {
    options,
    valueField: "value",
    labelField: "text",
    searchField: "text",
    create: false,
    maxOptions: null,
    openOnFocus: false,
    onType: function () {
      this.open();
    },
    onChange: value => {
      if (value) renderRaceTime(value);
    }
  });
}

document.querySelectorAll(".race-select-button").forEach(button => {
  button.addEventListener("click", () => {
    const select = document.getElementById(button.dataset.target);
    const tom = select.tomselect;

    if (tom.isOpen) {
      tom.close();
    } else {
      tom.open();
      tom.focus();
    }
  });
});

function renderMapStats() {
  const rows = mapPlaytime
    .map(row => ({
      map_name: row.map_name,
      minutes_played: Number(row.minutes_played || 0),
      last_seen: formatLocalTime(row.last_seen),
      last_seen_sort: new Date(forceUtc(row.last_seen)).getTime()
    }))
    .sort((a, b) => b.minutes_played - a.minutes_played);

  renderTable("mapStats", [
    { key: "map_name", label: "Map Name" },
    { key: "minutes_played", label: "Minutes Played" },
    { key: "last_seen", label: "Last Seen", sortKey: "last_seen_sort" }
  ], rows);
}

function renderHighestRaceLevel(raceColumn) {
  const rows = raceLevels
    .map(player => ({
      player_name: player.player_name,
      level: Number(player[raceColumn] || 0)
    }))
    .filter(row => row.level > 0)
    .sort((a, b) => b.level - a.level);

  renderTable("highestRaceLevel", [
    { key: "player_name", label: "Player Name" },
    { key: "level", label: "Level" }
  ], rows);
}

function renderHighestAnyRace() {
  const rows = raceLevels
    .map(player => {
      let bestRace = "";
      let bestLevel = 0;

      raceColumns.forEach(race => {
        const level = Number(player[race] || 0);

        if (level > bestLevel) {
          bestLevel = level;
          bestRace = prettyName(race);
        }
      });

      return {
        player_name: player.player_name,
        level: bestLevel,
        race: bestRace
      };
    })
    .filter(row => row.level > 0)
    .sort((a, b) => b.level - a.level);

  renderTable("highestAnyRace", [
    { key: "player_name", label: "Player Name" },
    { key: "level", label: "Level" },
    { key: "race", label: "Race" }
  ], rows);
}

function renderHighestTotalLevels() {
  const rows = raceLevels
    .map(player => ({
      player_name: player.player_name,
      levels: raceColumns.reduce((sum, race) => sum + Number(player[race] || 0), 0)
    }))
    .filter(row => row.levels > 0)
    .sort((a, b) => b.levels - a.levels);

  renderTable("highestTotalLevels", [
    { key: "player_name", label: "Player Name" },
    { key: "levels", label: "Levels" }
  ], rows);
}

function renderRaceTime(raceColumn) {
  const rows = racePlaytime
    .map(player => ({
      player_name: player.player_name,
      minutes: Number(player[raceColumn] || 0)
    }))
    .filter(row => row.minutes > 0)
    .sort((a, b) => b.minutes - a.minutes);

  renderTable("raceTimeTable", [
    { key: "player_name", label: "Player Name" },
    { key: "minutes", label: "Minutes" }
  ], rows);
}

function renderTotalTime() {
  const rows = racePlaytime
    .map(player => ({
      player_name: player.player_name,
      minutes: raceColumns.reduce((sum, race) => sum + Number(player[race] || 0), 0)
    }))
    .filter(row => row.minutes > 0)
    .sort((a, b) => b.minutes - a.minutes);

  renderTable("totalTimeTable", [
    { key: "player_name", label: "Player Name" },
    { key: "minutes", label: "Minutes" }
  ], rows);
}

async function init() {
  [mapPlaytime, racePlaytime, raceLevels] = await Promise.all([
    fetch(DATA_PATH + "map_playtime.json").then(r => r.json()),
    fetch(DATA_PATH + "race_playtime.json").then(r => r.json()),
    fetch(DATA_PATH + "race_levels.json").then(r => r.json())
  ]);

  raceColumns = getRaceColumns(racePlaytime)
  .sort((a, b) => prettyName(a).localeCompare(prettyName(b)));

  setupRaceDropdown();

  renderMapStats();
  renderHighestAnyRace();
  renderHighestTotalLevels();
  renderTotalTime();

  const defaultRace = raceColumns[0];

  if (defaultRace) {
    renderHighestRaceLevel(defaultRace);
    renderRaceTime(defaultRace);
  }

  document.getElementById("raceLevelInput").tomselect.clear();
  document.getElementById("raceTimeInput").tomselect.clear();
}

document.addEventListener("click", (e) => {

  const tab = e.target.closest(".stats-tab");

  if (!tab) return;

  const target = tab.dataset.tab;

  document.querySelectorAll(".stats-tab").forEach(btn => {
    btn.classList.toggle("active", btn === tab);
  });

  document.querySelectorAll(".stats-panel").forEach(panel => {
    panel.classList.toggle(
      "active",
      panel.dataset.panel === target
    );
  });
});

init();
</script>
