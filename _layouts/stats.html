<style>

  gap: clamp(0.1rem, 0.4vw, 0.25rem);
  margin-bottom: clamp(0.5rem, 1.2vw, 1rem);
}

  cursor: pointer;
  padding: clamp(0.2rem, 0.6vw, 0.4rem) clamp(0.35rem, 1vw, 0.75rem);
  font-size: clamp(0.45rem, 1.2vw, 1rem);
  line-height: 1.15;
  border: 1px solid #666;
  border-bottom: none;
  background: #2b2b2b;
  color: inherit;
  white-space: normal;
}

.stats-tab.active {
  font-weight: bold;
  background: #444;
}

  display: none;
}

.stats-panel.active {
  display: block;
}

.war3-stats input {
  margin: 0.5rem 0 1rem;
  max-width: 100%;
}

.war3-stats section {
  margin-bottom: 2rem;
}

.stats-table-wrap {
  max-height: 14lh;
  overflow-y: auto;
  overflow-x: hidden;
  width: 100%;
}

.war3-stats table {
  width: 100%;
  max-width: 100%;
  table-layout: fixed;
  border-collapse: collapse;
  display: table;
  font-size: clamp(.5rem, 1.2vw, 1rem);
}

.war3-stats thead {
  display: table-header-group;
}

.war3-stats tbody {
  display: table-row-group;
}

.war3-stats tr {
  display: table-row;
}

.war3-stats th,
.war3-stats td {
  display: table-cell;
  width: auto;
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: normal;
  vertical-align: top;
  box-sizing: border-box;
  padding: 0.5em 0.75em;
  line-height: 1.25;
}

  top: 0;
  z-index: 2;
}

.war3-stats th .header-inner {
  display: flex;

  align-items: center;
  gap: 0.5rem;
  width: 100%;
}

.war3-stats th .header-label {
  flex: 1 1 auto;
  min-width: 0;
}

.war3-stats th .header-sort {
  flex: 0 0 1.25em;
  width: 1.25em;
  text-align: center;
  opacity: 0.7;
}

.race-select-wrap,
.table-search-wrap {
  display: flex;
  width: 100%;
  max-width: 100%;
  margin: 0.5rem 0 1rem;
  font-size: clamp(.5rem, 1.2vw, 1rem);
}

.race-select-wrap .ts-wrapper,
.table-search-wrap .ts-wrapper {
  flex: 1 1 auto;
  min-width: 0;
  width: 100%;
}

.race-select-wrap .ts-control,
.table-search-wrap .ts-control {
  width: 100%;
  min-height: 0;
  padding: 0.5em 0.75em;
  font-size: inherit;
  line-height: 1.25;
}

.race-select-wrap .ts-control input,
.table-search-wrap .ts-control input {

}

.race-select-button,
.table-search-button {
  flex: 0 0 clamp(1.5rem, 3vw, 2.5rem);
  width: clamp(1.5rem, 3vw, 2.5rem);
  padding: 0;
  font-size: inherit;
  line-height: 1;
  cursor: pointer;
}

.ts-control::after {
  margin-left: auto;
  opacity: 0.7;
  font-size: 0.75em;
}

.ts-control {
  cursor: pointer;
}

.cum-counter {
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  border: 1px solid #666;
  background: #2b2b2b;
  font-size: clamp(.65rem, 1.4vw, 1rem);
}
</style>

<script>
const DATA_PATH = "/assets/data/";

let mapPlaytime = [];
let racePlaytime = [];
let raceLevels = [];
let topChatters = [];
let topCurseUsers = [];
let mostSlainPlayers = [];
let mostSlappedPlayers = [];
let adminCommandUsage = [];
let raceColumns = [];
let tableFilters = {};

function escapeHTML(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function prettyName(str) {
  return str.replaceAll("_", " ").replace(/\b\w/g, c => c.toUpperCase());
}

function forceUtc(utcString) {
  if (!utcString) return "";

  let fixed = String(utcString);

  if (!fixed.endsWith("Z") && !fixed.includes("+")) {
    fixed += "Z";
  }

  return fixed;
}

function formatLocalTime(utcString) {
  if (!utcString) return "";

  let fixed = String(utcString);

  if (!fixed.endsWith("Z") && !fixed.includes("+")) {
    fixed += "Z";
  }

  return new Date(forceUtc(fixed)).toLocaleString(undefined, {
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit",
    second: "2-digit"
  });
}

function getRaceColumns(data) {
  if (!data.length) return [];

  return Object.keys(data[0]).filter(key =>
    key !== "player_name" &&
    key !== "last_seen"
  );
}

function formatAliases(aliases) {
  if (!Array.isArray(aliases) || aliases.length === 0) return "";
  return aliases.join(", ");
}

function formatMatchedWords(words) {
  if (!Array.isArray(words) || words.length === 0) return "";

  return words
    .slice(0, 8)
    .map(item => `${item.word} (${item.count})`)
    .join(", ");
}

async function fetchJson(filename) {
  const response = await fetch(DATA_PATH + filename + "?v=" + Date.now(), {
    cache: "no-store"
  });

  if (!response.ok) {
    console.warn(`Could not load ${filename}`);
    return [];
  }

  return response.json();
}

const sortStates = {};

function uniqueSortedValues(rows, key) {
  return [...new Set(
    rows
      .map(row => row[key])
      .filter(value => value !== undefined && value !== null && String(value).trim() !== "")
      .map(value => String(value))
  )].sort((a, b) => a.localeCompare(b));
}

function applyTableFilter(filterId, rows, key) {
  const value = tableFilters[filterId];

  if (!value) {
    return rows;
  }

  return rows.filter(row => String(row[key] ?? "") === String(value));
}

function setupTableSearch(selectId, rows, key, onChange) {
  const select = document.getElementById(selectId);
  if (!select) return;

  if (select.tomselect) {
    select.tomselect.destroy();
  }

  const options = uniqueSortedValues(rows, key).map(value => ({
    value,
    text: value
  }));

  new TomSelect(`#${selectId}`, {
    options,
    valueField: "value",
    labelField: "text",
    searchField: "text",
    create: false,
    maxOptions: null,
    allowEmptyOption: true,
    openOnFocus: false,
    placeholder: "Show all",
    onType: function () {
      this.open();
    },
    onChange: value => {
      tableFilters[selectId] = value || "";
      onChange();
    }
  });
}

function renderTable(tableId, columns, rows) {
  const table = document.getElementById(tableId);

  const getArrow = (key) => {
    const stateKey = `${tableId}:${key}`;

    if (!(stateKey in sortStates)) {
      return "↕";
    }

    return sortStates[stateKey] ? "↑" : "↓";
  };

  table.innerHTML = `
    <thead>
      <tr>
        ${columns.map(col =>
          `<th data-key="${col.key}">
          <span class="header-inner">
          <span class="header-label">${escapeHTML(col.label)}</span>
          <span class="header-sort">${getArrow(col.key)}</span>
          </span></th>`
        ).join("")}
      </tr>
    </thead>
    <tbody>
      ${rows.map(row => `
        <tr>
          ${columns.map(col =>
            `<td>${escapeHTML(row[col.key] ?? "")}</td>`
          ).join("")}
        </tr>
      `).join("")}
    </tbody>
  `;

  table.querySelectorAll("th").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      const sortKey = columns.find(col => col.key === key)?.sortKey || key;
      const stateKey = `${tableId}:${key}`;
      const currentState = sortStates[stateKey] || false;

      Object.keys(sortStates).forEach(k => {
        if (k.startsWith(`${tableId}:`)) {
          delete sortStates[k];
        }
      });

      sortStates[stateKey] = !currentState;

      const asc = sortStates[stateKey];

      rows.sort((a, b) => {
        const av = a[sortKey] ?? "";
        const bv = b[sortKey] ?? "";

        const aNum = Number(av);
        const bNum = Number(bv);

        if (!isNaN(aNum) && !isNaN(bNum)) {
          return asc ? aNum - bNum : bNum - aNum;
        }

        return asc
          ? String(av).localeCompare(String(bv))
          : String(bv).localeCompare(String(av));
      });

      renderTable(tableId, columns, rows);
    });
  });
}

function setupRaceDropdown() {
  const options = raceColumns.map(race => ({
    value: race,
    text: prettyName(race)
  }));

  new TomSelect("#raceLevelInput", {
    options,
    valueField: "value",
    labelField: "text",
    searchField: "text",
    create: false,
    maxOptions: null,
    openOnFocus: false,
    onType: function () {
      this.open();
    },
    onChange: value => {
      if (value) renderHighestRaceLevel(value);
    }
  });

  new TomSelect("#raceTimeInput", {
    options,
    valueField: "value",
    labelField: "text",
    searchField: "text",
    create: false,
    maxOptions: null,
    openOnFocus: false,
    onType: function () {
      this.open();
    },
    onChange: value => {
      if (value) renderRaceTime(value);
    }
  });
}

document.querySelectorAll(".race-select-button, .table-search-button").forEach(button => {
  button.addEventListener("click", () => {
    const select = document.getElementById(button.dataset.target);
    const tom = select.tomselect;

    if (!tom) return;

    if (tom.isOpen) {
      tom.close();
    } else {
      tom.open();
      tom.focus();
    }
  });
});

function renderMapStats() {
  const rows = mapPlaytime
    .map(row => ({
      map_name: row.map_name,
      minutes_played: Number(row.minutes_played || 0),
      last_seen: formatLocalTime(row.last_seen),
      last_seen_sort: new Date(forceUtc(row.last_seen)).getTime()
    }))
    .sort((a, b) => b.minutes_played - a.minutes_played);

  const filteredRows = applyTableFilter("mapStatsSearch", rows, "map_name");

  renderTable("mapStats", [
    { key: "map_name", label: "Map Name" },
    { key: "minutes_played", label: "Minutes Played" },
    { key: "last_seen", label: "Last Seen", sortKey: "last_seen_sort" }
  ], filteredRows);
}

function renderHighestRaceLevel(raceColumn) {
  const rows = raceLevels
    .map(player => ({
      player_name: player.player_name,
      level: Number(player[raceColumn] || 0)
    }))
    .filter(row => row.level > 0)
    .sort((a, b) => b.level - a.level);

  renderTable("highestRaceLevel", [
    { key: "player_name", label: "Player Name" },
    { key: "level", label: "Level" }
  ], rows);
}

function renderHighestAnyRace() {
  const rows = raceLevels
    .map(player => {
      let bestRace = "";
      let bestLevel = 0;

      raceColumns.forEach(race => {
        const level = Number(player[race] || 0);

        if (level > bestLevel) {
          bestLevel = level;
          bestRace = prettyName(race);
        }
      });

      return {
        player_name: player.player_name,
        level: bestLevel,
        race: bestRace
      };
    })
    .filter(row => row.level > 0)
    .sort((a, b) => b.level - a.level);

  const filteredRows = applyTableFilter("highestAnyRaceSearch", rows, "player_name");

  renderTable("highestAnyRace", [
    { key: "player_name", label: "Player Name" },
    { key: "level", label: "Level" },
    { key: "race", label: "Race" }
  ], filteredRows);
}

function renderHighestTotalLevels() {
  const rows = raceLevels
    .map(player => ({
      player_name: player.player_name,
      levels: raceColumns.reduce((sum, race) => sum + Number(player[race] || 0), 0)
    }))
    .filter(row => row.levels > 0)
    .sort((a, b) => b.levels - a.levels);

  const filteredRows = applyTableFilter("highestTotalLevelsSearch", rows, "player_name");

  renderTable("highestTotalLevels", [
    { key: "player_name", label: "Player Name" },
    { key: "levels", label: "Levels" }
  ], filteredRows);
}

function renderRaceTime(raceColumn) {
  const rows = racePlaytime
    .map(player => ({
      player_name: player.player_name,
      minutes: Number(player[raceColumn] || 0)
    }))
    .filter(row => row.minutes > 0)
    .sort((a, b) => b.minutes - a.minutes);

  renderTable("raceTimeTable", [
    { key: "player_name", label: "Player Name" },
    { key: "minutes", label: "Minutes" }
  ], rows);
}

function renderTotalTime() {
  const rows = racePlaytime
    .map(player => ({
      player_name: player.player_name,
      minutes: raceColumns.reduce((sum, race) => sum + Number(player[race] || 0), 0)
    }))
    .filter(row => row.minutes > 0)
    .sort((a, b) => b.minutes - a.minutes);

  const filteredRows = applyTableFilter("totalTimeTableSearch", rows, "player_name");

  renderTable("totalTimeTable", [
    { key: "player_name", label: "Player Name" },
    { key: "minutes", label: "Minutes" }
  ], filteredRows);
}

function renderTopChatters() {
  const rows = topChatters
    .map(row => ({
      player_name: row.player_name,
      message_count: Number(row.message_count || 0)
    }))
    .sort((a, b) => b.message_count - a.message_count);

  const filteredRows = applyTableFilter("topChattersSearch", rows, "player_name");

  renderTable("topChattersTable", [
    { key: "player_name", label: "Player Name" },
    { key: "message_count", label: "Messages" }
  ], filteredRows);
}

function renderTopCurseUsers() {
  const rows = topCurseUsers
    .map(row => ({
      player_name: row.player_name,
      curse_count: Number(row.curse_count || 0),
      curse_messages: Number(row.curse_messages || 0),
      matched_words_display: formatMatchedWords(row.matched_words)
    }))
    .sort((a, b) => b.curse_count - a.curse_count);

  const filteredRows = applyTableFilter("curseUsersSearch", rows, "player_name");

  renderTable("curseUsersTable", [
    { key: "player_name", label: "Player Name" },
    { key: "curse_count", label: "Curse Count" },
    { key: "curse_messages", label: "Messages With Curses" },
    { key: "matched_words_display", label: "Top Words" }
  ], filteredRows);
}

function renderMostSlainPlayers() {
  const rows = mostSlainPlayers
    .map(row => ({
      player_name: row.player_name,
      slain_count: Number(row.slain_count || 0),
      aliases_display: formatAliases(row.aliases)
    }))
    .sort((a, b) => b.slain_count - a.slain_count);

  const filteredRows = applyTableFilter("mostSlainSearch", rows, "player_name");

  renderTable("mostSlainTable", [
    { key: "player_name", label: "Player Name" },
    { key: "slain_count", label: "Slays" },
    { key: "aliases_display", label: "Aliases" }
  ], filteredRows);
}

function renderMostSlappedPlayers() {
  const rows = mostSlappedPlayers
    .map(row => ({
      player_name: row.player_name,
      slapped_count: Number(row.slapped_count || 0),
      total_slap_damage: Number(row.total_slap_damage || 0),
      aliases_display: formatAliases(row.aliases)
    }))
    .sort((a, b) => b.slapped_count - a.slapped_count);

  const filteredRows = applyTableFilter("mostSlappedSearch", rows, "player_name");

  renderTable("mostSlappedTable", [
    { key: "player_name", label: "Player Name" },
    { key: "slapped_count", label: "Slaps" },
    { key: "total_slap_damage", label: "Total Damage" },
    { key: "aliases_display", label: "Aliases" }
  ], filteredRows);
}

function renderAdminCommandUsage() {
  const rows = adminCommandUsage
    .map(row => ({
      admin_name: row.admin_name,
      command: row.command,
      command_count: Number(row.command_count || 0)
    }))
    .sort((a, b) => b.command_count - a.command_count);

  const filteredRows = applyTableFilter("adminCommandsSearch", rows, "admin_name");

  renderTable("adminCommandsTable", [
    { key: "admin_name", label: "Admin" },
    { key: "command", label: "Command" },
    { key: "command_count", label: "Uses" }
  ], filteredRows);
}

function renderCumCounter() {
  const box = document.getElementById("cumCounter");
  if (!box) return;

  let total = 0;
  let users = 0;

  topCurseUsers.forEach(player => {
    const words = player.matched_words || [];

    const playerCumTotal = words
      .filter(item => String(item.word || "").toLowerCase() === "cum")
      .reduce((sum, item) => sum + Number(item.count || 0), 0);

    if (playerCumTotal > 0) {
      total += playerCumTotal;
      users += 1;
    }
  });

  box.innerHTML = `
    <strong>Cum Counter:</strong>
    ${escapeHTML(total)} total uses from ${escapeHTML(users)} players.
  `;
}

async function init() {
  [
    mapPlaytime,
    racePlaytime,
    raceLevels,
    topChatters,
    topCurseUsers,
    mostSlainPlayers,
    mostSlappedPlayers,
    adminCommandUsage
  ] = await Promise.all([
    fetchJson("map_playtime.json"),
    fetchJson("race_playtime.json"),
    fetchJson("race_levels.json"),
    fetchJson("top_chatters.json"),
    fetchJson("top_curse_users.json"),
    fetchJson("most_slain_players.json"),
    fetchJson("most_slapped_players.json"),
    fetchJson("admin_command_usage.json")
  ]);

  raceColumns = getRaceColumns(racePlaytime)
  .sort((a, b) => prettyName(a).localeCompare(prettyName(b)));

  setupRaceDropdown();
  setupTableSearch("mapStatsSearch", mapPlaytime, "map_name", renderMapStats);
  setupTableSearch("highestAnyRaceSearch", raceLevels, "player_name", renderHighestAnyRace);
  setupTableSearch("highestTotalLevelsSearch", raceLevels, "player_name", renderHighestTotalLevels);
  setupTableSearch("totalTimeTableSearch", racePlaytime, "player_name", renderTotalTime);
  setupTableSearch("topChattersSearch", topChatters, "player_name", renderTopChatters);
  setupTableSearch("curseUsersSearch", topCurseUsers, "player_name", renderTopCurseUsers);
  setupTableSearch("mostSlainSearch", mostSlainPlayers, "player_name", renderMostSlainPlayers);
  setupTableSearch("mostSlappedSearch", mostSlappedPlayers, "player_name", renderMostSlappedPlayers);
  setupTableSearch("adminCommandsSearch", adminCommandUsage, "admin_name", renderAdminCommandUsage);

  renderMapStats();
  renderHighestAnyRace();
  renderHighestTotalLevels();
  renderTotalTime();
  renderTopChatters();
  renderTopCurseUsers();
  renderMostSlainPlayers();
  renderMostSlappedPlayers();
  renderAdminCommandUsage();
  renderCumCounter();

  const defaultRace = raceColumns[0];

  if (defaultRace) {
    renderHighestRaceLevel(defaultRace);
    renderRaceTime(defaultRace);
  }

  document.getElementById("raceLevelInput").tomselect.clear();
  document.getElementById("raceTimeInput").tomselect.clear();
}

document.addEventListener("click", (e) => {

  const tab = e.target.closest(".stats-tab");

  if (!tab) return;

  const target = tab.dataset.tab;

  document.querySelectorAll(".stats-tab").forEach(btn => {
    btn.classList.toggle("active", btn === tab);
  });

  document.querySelectorAll(".stats-panel").forEach(panel => {
    panel.classList.toggle(
      "active",
      panel.dataset.panel === target
    );
  });
});

init();
</script>
