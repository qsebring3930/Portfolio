name: Download server logs

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-logs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Microsoft ODBC Driver 18
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install Python dependencies
        run: pip install paramiko pyodbc

      - name: Download logs from SFTP and import into SQL
        run: python script/download_logs.py
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_REMOTE_LOG_DIR: ${{ secrets.SFTP_REMOTE_LOG_DIR }}

          AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}

      - name: Commit downloaded logs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add script/logs/

          if git diff --cached --quiet; then
            echo "No log changes to commit."
            exit 0
          fi

          git commit -m "Update server logs"

          git pull --rebase origin master
          git push origin master

      - name: Commit downloaded logs and JSON data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add script/logs/
          git add assets/data/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update server logs and stats JSON"
          git pull --rebase origin master
          git push origin master
