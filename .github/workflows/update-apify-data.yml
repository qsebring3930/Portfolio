name: Run Apify Pull

permissions:
  contents: write

concurrency:
  group: apify-pull
  cancel-in-progress: false

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - run: python script/getwar3races.py

      - name: Commit race pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          git add script/war3cs2_pages
      
          if git diff --cached --quiet; then
            echo "No race page changes to commit"
            exit 0
          fi
      
          git commit -m "Update race pages"
          git pull --rebase origin master
          git push origin HEAD:master
      
      - run: python script/fetch_apify.py
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}

          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_REMOTE_LOG_DIR: ${{ secrets.SFTP_REMOTE_LOG_DIR }}
          SFTP_REMOTE_BACKUP_DIR: ${{ secrets.SFTP_REMOTE_BACKUP_DIR }}

      - name: Commit JSON exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          git add assets/data/*.json
          git add assets/data/_*.json
          git add assets/data/_*.jsonl
      
          if git diff --cached --quiet; then
            echo "No JSON changes"
            exit 0
          fi
      
          git commit -m "Update stats JSON"
      
          git pull --rebase -X theirs origin master
      
          git push origin HEAD:master
