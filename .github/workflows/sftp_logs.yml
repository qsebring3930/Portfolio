name: Download server logs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: war3cs2-stats-pipeline
      cancel-in-progress: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install paramiko

      - name: Download backups from SFTP and update JSON data
        run: python script/download_logs.py
        env:
          INCLUDE_LOGS: "0"
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_REMOTE_LOG_DIR: ${{ secrets.SFTP_REMOTE_LOG_DIR }}
          SFTP_REMOTE_BACKUP_DIR: ${{ secrets.SFTP_REMOTE_BACKUP_DIR }}

      - name: Commit downloaded backups and JSON data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "Git status before sync:"
          git status --short

          # Save generated changes temporarily so pull/rebase is clean.
          git stash push -u -m "generated json stats" || true

          # Get latest remote changes.
          git pull --rebase origin master

          # Re-apply generated changes.
          git stash pop || true

          echo "Git status after sync:"
          git status --short

          # Stage EVERYTHING, including deleted local logs/backups and new _ JSON files.
          git add -A

          echo "Git status after staging:"
          git status --short

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update server JSON stats"
          git push origin master
