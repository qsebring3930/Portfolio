<script>
const DATA_PATH = "/assets/data/";

let mapPlaytime = [];
let racePlaytime = [];
let raceLevels = [];
let topChatters = [];
let topCurseUsers = [];
let mostSlainPlayers = [];
let mostSlappedPlayers = [];
let adminCommandUsage = [];
let raceColumns = [];
let rtvRequests = {};
let tableFilters = {};
let roundScoreboard = [];
let weaponKills = [];
let moneySummary = [];
let defuseKits = [];

function showStatsLoader(message = "Loading stats...") {
  const overlay = document.getElementById("statsLoadingOverlay");
  const text = overlay?.querySelector(".stats-loading-text");
  const stats = document.querySelector(".war3-stats");

  if (text) {
    text.textContent = message;
  }

  stats?.classList.add("stats-content-hidden");

  if (overlay) {
    overlay.classList.remove("hidden");
    overlay.style.display = "flex";
    overlay.style.pointerEvents = "auto";
  }
}

function hideStatsLoader() {
  const overlay = document.getElementById("statsLoadingOverlay");
  const stats = document.querySelector(".war3-stats");

  stats?.classList.remove("stats-content-hidden");

  if (overlay) {
    overlay.classList.add("hidden");
    overlay.style.display = "none";
    overlay.style.pointerEvents = "none";
  }
}

function escapeHTML(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function prettyName(str) {
  return str.replaceAll("_", " ").replace(/\b\w/g, c => c.toUpperCase());
}

function compactName(value) {
  return String(value ?? "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "");
}

function compactRaceName(value) {
  return compactName(value)
    .replaceAll("0", "o")
    .replaceAll("1", "l")
    .replaceAll("3", "e")
    .replaceAll("4", "a")
    .replaceAll("5", "s")
    .replaceAll("7", "t");
}

function levenshteinDistance(a, b, maxDistance = 99) {
  if (Math.abs(a.length - b.length) > maxDistance) {
    return maxDistance + 1;
  }

  const previous = Array(b.length + 1)
    .fill(0)
    .map((_, index) => index);

  for (let i = 1; i <= a.length; i++) {
    let lastDiagonal = previous[0];
    previous[0] = i;

    let rowBest = previous[0];

    for (let j = 1; j <= b.length; j++) {
      const oldDiagonal = previous[j];

      const cost = a[i - 1] === b[j - 1] ? 0 : 1;

      previous[j] = Math.min(
        previous[j] + 1,
        previous[j - 1] + 1,
        lastDiagonal + cost
      );

      lastDiagonal = oldDiagonal;
      rowBest = Math.min(rowBest, previous[j]);
    }

    if (rowBest > maxDistance) {
      return maxDistance + 1;
    }
  }

  return previous[b.length];
}

function getRaceSuffixVariants() {
  return raceColumns
    .flatMap(race => [
      prettyName(race),
      race,
      race.replaceAll("_", ""),
      prettyName(race).replaceAll(" ", "")
    ])
    .map(race => ({
      display: race,
      compact: compactRaceName(race)
    }))
    .filter(race => race.compact.length >= 4)
    .sort((a, b) => b.compact.length - a.compact.length);
}

function getAllowedRaceSuffixErrors(raceCompact) {
  if (raceCompact.length >= 12) return 2;
  if (raceCompact.length >= 7) return 1;
  return 0;
}

function cleanRoundPlayerName(name) {
  let clean = String(name ?? "").trim();

  if (!clean) return "";

  // Remove trailing level first:
  // ZickziiEnigmaLvl21 -> ZickziiEnigma
  clean = clean.replace(/Lvl\d+$/i, "");

  const raceNames = getRaceSuffixVariants();
  const cleanCompact = compactRaceName(clean);

  // 1. Exact suffix pass.
  for (const race of raceNames) {
    if (cleanCompact.endsWith(race.compact)) {
      const cutLength = race.display.replaceAll(" ", "").length;
      return clean.slice(0, Math.max(0, clean.length - cutLength)).trim() || clean;
    }
  }

  // 2. Fuzzy Saboteur suffix pass.
  // Allows the race suffix to have 1-2 wrong/missing/extra characters.
  let bestMatch = null;

  for (const race of raceNames) {
    const allowedErrors = getAllowedRaceSuffixErrors(race.compact);

    if (allowedErrors <= 0) {
      continue;
    }

    for (
      let candidateLength = race.compact.length - allowedErrors;
      candidateLength <= race.compact.length + allowedErrors;
      candidateLength++
    ) {
      if (candidateLength <= 0 || candidateLength > cleanCompact.length) {
        continue;
      }

      const candidateSuffix = cleanCompact.slice(-candidateLength);
      const distance = levenshteinDistance(
        candidateSuffix,
        race.compact,
        allowedErrors
      );

      if (distance > allowedErrors) {
        continue;
      }

      const score = distance / race.compact.length;

      if (
        !bestMatch ||
        distance < bestMatch.distance ||
        (distance === bestMatch.distance && race.compact.length > bestMatch.race.compact.length)
      ) {
        bestMatch = {
          race,
          distance,
          candidateLength,
          score
        };
      }
    }
  }

  if (bestMatch) {
    const cutLength = bestMatch.candidateLength;
    return clean.slice(0, Math.max(0, clean.length - cutLength)).trim() || clean;
  }

  return clean;
}

function forceUtc(utcString) {
  if (!utcString) return "";

  let fixed = String(utcString);

  if (!fixed.endsWith("Z") && !fixed.includes("+")) {
    fixed += "Z";
  }

  return fixed;
}

function formatLocalTime(utcString) {
  if (!utcString) return "";

  let fixed = String(utcString);

  if (!fixed.endsWith("Z") && !fixed.includes("+")) {
    fixed += "Z";
  }

  return new Date(forceUtc(fixed)).toLocaleString(undefined, {
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit",
    second: "2-digit"
  });
}

function getRaceColumns(data) {
  if (!data.length) return [];

  return Object.keys(data[0]).filter(key =>
    key !== "player_name" &&
    key !== "last_seen"
  );
}

function formatAliases(aliases) {
  if (!Array.isArray(aliases) || aliases.length === 0) return "";
  return aliases.join(", ");
}

function formatMatchedWords(words) {
  if (!Array.isArray(words) || words.length === 0) return "";

  return words
    .slice(0, 8)
    .map(item => `${item.word} (${item.count})`)
    .join(", ");
}

async function fetchJson(filename) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 15000);

  try {
    const response = await fetch(DATA_PATH + filename + "?v=" + Date.now(), {
      cache: "no-store",
      signal: controller.signal
    });

    if (!response.ok) {
      console.warn(`Could not load ${filename}`);
      return [];
    }

    return await response.json();
  } catch (error) {
    console.warn(`Failed to load ${filename}`, error);
    return [];
  } finally {
    clearTimeout(timeout);
  }
}

const sortStates = {};

function uniqueSortedValues(rows, key) {
  return [...new Set(
    rows
      .map(row => row[key])
      .filter(value => value !== undefined && value !== null && String(value).trim() !== "")
      .map(value => String(value))
  )].sort((a, b) => a.localeCompare(b));
}

function applyTableFilter(filterId, rows, key) {
  const value = tableFilters[filterId];

  if (!value) {
    return rows;
  }

  return rows.filter(row => String(row[key] ?? "") === String(value));
}

function setupTableSearch(selectId, rows, key, onChange) {
  const select = document.getElementById(selectId);
  if (!select) return;

  if (select.tomselect) {
    select.tomselect.destroy();
  }

  const options = uniqueSortedValues(rows, key).map(value => ({
    value,
    text: value
  }));

  new TomSelect(`#${selectId}`, {
    options,
    valueField: "value",
    labelField: "text",
    searchField: "text",
    create: false,
    maxOptions: null,
    allowEmptyOption: true,
    openOnFocus: false,
    placeholder: "Show all",
    onType: function () {
      this.open();
    },
    onChange: value => {
      tableFilters[selectId] = value || "";
      onChange();
    }
  });
}

function groupRowsByCleanPlayer(rows, numericFields) {
  const grouped = {};

  rows.forEach(row => {
    const playerName = cleanRoundPlayerName(row.player_name);

    if (!playerName) return;

    if (!grouped[playerName]) {
      grouped[playerName] = {
        ...row,
        player_name: playerName
      };

      numericFields.forEach(field => {
        grouped[playerName][field] = 0;
      });
    }

    numericFields.forEach(field => {
      grouped[playerName][field] += Number(row[field] || 0);
    });
  });

  return Object.values(grouped);
}

function toNumber(value) {
  const number = Number(value);
  return Number.isFinite(number) ? number : 0;
}

function normalizeRoundName(row) {
  return cleanRoundPlayerName(
    row.player_name ||
    row.name ||
    row.player ||
    ""
  );
}

function normalizeScoreboardRows(rows) {
  if (!Array.isArray(rows)) return [];

  return rows.map(row => ({
    ...row,
    raw_player_name: row.raw_player_name || row.player_name || "",
    player_name: normalizeRoundName(row),
    steam_id: String(row.steam_id ?? row.steamId ?? row.steam ?? ""),

    kills: toNumber(row.kills ?? row.kill_count),
    deaths: toNumber(row.deaths),
    assists: toNumber(row.assists),
    mvps: toNumber(row.mvps),
    score: toNumber(row.score),
    damage: toNumber(row.damage),
    rounds_played: toNumber(row.rounds_played),

    adr: toNumber(row.adr),
    kd_ratio: toNumber(row.kd_ratio),
    kad_ratio: toNumber(row.kad_ratio)
  }));
}

function normalizeWeaponRows(rows) {
  if (!Array.isArray(rows)) return [];

  return rows.map(row => ({

      row.weapon_name ||
      row.item_name ||
      "",

    kills: toNumber(row.kills ?? row.kill_count)
  }));
}

function groupRowsByPlayerIdentity(rows, numericFields) {
  const grouped = {};

  rows.forEach(row => {
    const playerName = cleanRoundPlayerName(row.player_name);
    const steamId = String(row.steam_id ?? "").trim();

    if (!playerName) return;

    const key = steamId || playerName;

    if (!grouped[key]) {
      grouped[key] = {
        ...row,
        player_name: playerName,
        steam_id: steamId
      };

      numericFields.forEach(field => {
        grouped[key][field] = 0;
      });
    }

    numericFields.forEach(field => {
      grouped[key][field] += toNumber(row[field]);
    });
  });

  return Object.values(grouped);
}

let playerIdentityBySteamId = {};
let playerAliasToCanonical = {};

function nameKey(value) {
  return compactName(cleanRoundPlayerName(value));
}

function chooseBetterDisplayName(a, b) {
  const cleanA = cleanRoundPlayerName(a);
  const cleanB = cleanRoundPlayerName(b);

  if (!cleanA) return cleanB;
  if (!cleanB) return cleanA;

  // Prefer the name with fewer War3 leftovers / shorter junk.
  // But don't prefer tiny aliases like "hKj" over readable names unless exact.
  if (cleanB.length >= 3 && cleanB.length < cleanA.length) return cleanB;

  return cleanA;
}

function collectIdentity(row) {
  const steamId = String(row.steam_id ?? row.steamId ?? row.steam ?? "").trim();

  const rawNames = [
    row.raw_player_name,
    row.player_name,
    row.name,
    row.player
  ].filter(Boolean);

  if (!steamId || rawNames.length === 0) return;

  if (!playerIdentityBySteamId[steamId]) {
    playerIdentityBySteamId[steamId] = {
      steam_id: steamId,
      canonical_name: cleanRoundPlayerName(rawNames[0]),
      aliases: new Set()
    };
  }

  const identity = playerIdentityBySteamId[steamId];

  rawNames.forEach(name => {
    const cleaned = cleanRoundPlayerName(name);
    const key = nameKey(name);

    if (!cleaned || !key) return;

    identity.aliases.add(cleaned);
    identity.aliases.add(String(name).trim());

    identity.canonical_name = chooseBetterDisplayName(
      identity.canonical_name,
      cleaned
    );
  });
}

function buildPlayerIdentityMap() {
  playerIdentityBySteamId = {};
  playerAliasToCanonical = {};

  [
    ...roundScoreboard,
    ...weaponKills,
    ...moneySummary,
    ...defuseKits
  ].forEach(collectIdentity);

  Object.values(playerIdentityBySteamId).forEach(identity => {
    identity.aliases.forEach(alias => {
      const key = nameKey(alias);

      if (!key) return;

      playerAliasToCanonical[key] = identity.canonical_name;
    });

    const canonicalKey = nameKey(identity.canonical_name);

    if (canonicalKey) {
      playerAliasToCanonical[canonicalKey] = identity.canonical_name;
    }
  });
}

function canonicalPlayerName(name) {
  const cleaned = cleanRoundPlayerName(name);
  const key = nameKey(cleaned);

  return playerAliasToCanonical[key] || cleaned;
}

function renderTable(tableId, columns, rows) {
  const table = document.getElementById(tableId);

  const getArrow = (key) => {
    const stateKey = `${tableId}:${key}`;

    if (!(stateKey in sortStates)) {
      return "↕";
    }

    return sortStates[stateKey] ? "↑" : "↓";
  };

  table.innerHTML = `
    <thead>
      <tr>
        ${columns.map(col =>
          `<th data-key="${col.key}">
          <span class="header-inner">
          <span class="header-label">${escapeHTML(col.label)}</span>
          <span class="header-sort">${getArrow(col.key)}</span>
          </span></th>`
        ).join("")}
      </tr>
    </thead>
    <tbody>
      ${rows.map(row => `
        <tr>
          ${columns.map(col =>
            `<td>${escapeHTML(row[col.key] ?? "")}</td>`
          ).join("")}
        </tr>
      `).join("")}
    </tbody>
  `;

  table.querySelectorAll("th").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      const sortKey = columns.find(col => col.key === key)?.sortKey || key;
      const stateKey = `${tableId}:${key}`;
      const currentState = sortStates[stateKey] || false;

      Object.keys(sortStates).forEach(k => {
        if (k.startsWith(`${tableId}:`)) {
          delete sortStates[k];
        }
      });

      sortStates[stateKey] = !currentState;

      const asc = sortStates[stateKey];

      rows.sort((a, b) => {
        const av = a[sortKey] ?? "";
        const bv = b[sortKey] ?? "";

        const aNum = Number(av);
        const bNum = Number(bv);

        if (!isNaN(aNum) && !isNaN(bNum)) {
          return asc ? aNum - bNum : bNum - aNum;
        }

        return asc
          ? String(av).localeCompare(String(bv))
          : String(bv).localeCompare(String(av));
      });

      renderTable(tableId, columns, rows);
    });
  });
}

function getTopWeaponCategoryRows() {
  const groupedByPlayerAndCategory = {};

  weaponKills.forEach(row => {
    const weaponCategory = row.weapon_category || "";
    const playerName = cleanRoundPlayerName(row.player_name);
    const steamId = String(row.steam_id ?? "").trim();
    const kills = toNumber(row.kills);

    if (!weaponCategory || !playerName || kills <= 0) return;

    const playerKey = steamId || playerName;
    const key = `${weaponCategory}|||${playerKey}`;

    if (!groupedByPlayerAndCategory[key]) {
      groupedByPlayerAndCategory[key] = {
        weapon_category: weaponCategory,
        player_name: playerName,
        steam_id: steamId,
        kills: 0
      };
    }

    groupedByPlayerAndCategory[key].kills += kills;

    // Prefer the cleaner/longer display name if the same Steam ID shows up with variants.
    if (playerName.length > groupedByPlayerAndCategory[key].player_name.length) {
      groupedByPlayerAndCategory[key].player_name = playerName;
    }
  });

  const bestByCategory = {};

  Object.values(groupedByPlayerAndCategory).forEach(row => {
    if (
      !bestByCategory[row.weapon_category] ||
      row.kills > bestByCategory[row.weapon_category].kills
    ) {
      bestByCategory[row.weapon_category] = row;
    }
  });

  return Object.values(bestByCategory)
    .sort((a, b) => b.kills - a.kills);
}

    renderPopularRaces();
    renderTopChatters();
    renderTopCurseUsers();
    renderMostSlainPlayers();
    renderMostSlappedPlayers();
    renderAdminCommandUsage();
    renderCumCounter();
    renderCombatStats();
    renderPerformanceStats();
    renderWeaponKills();
    renderMoneySummary();
    renderDefuseKits();

    const defaultRace = raceColumns[0];

    if (defaultRace) {
      renderHighestRaceLevel(defaultRace);
      renderRaceTime(defaultRace);

      document.getElementById("raceLevelInput")?.tomselect?.setValue(defaultRace, true);
      document.getElementById("raceTimeInput")?.tomselect?.setValue(defaultRace, true);
    }

    setTimeout(() => {
      hideStatsLoader();
    }, 30);
  } catch (error) {
    console.error("Failed to load stats:", error);
    showStatsLoader("Some stats failed to load.");

    setTimeout(() => {
      hideStatsLoader();
    }, 300);
  }
}

init();
</script>
